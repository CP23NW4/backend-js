name: testchange

on:
  push:
    branches:
      - test-cicd

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      
    - name: Install SSH key
      uses: webfactory/ssh-agent@v0.5.4
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        
    - name: SSH into Azure VM and pull new code
      run: |
        ssh -o StrictHostKeyChecking=no mnw@20.189.126.248 "cd /home/mnw/backend-js && git pull"

    - name: Show Docker container status
      run: |
        ssh -o StrictHostKeyChecking=no mnw@20.189.126.248 "docker ps -a"

    - name: Confirm before stopping and removing existing containers
      run: |
        echo "Are you sure you want to stop and remove existing containers?"
        echo "Proceeding will stop and remove the containers."
        echo "Please confirm by setting the variable 'CONTINUE_REMOVAL' to 'true' in the workflow run."
        echo "If you do not want to proceed, do not set the variable or set it to any other value."
        exit 1

    - name: Stop and remove existing containers
      if: env.CONTINUE_REMOVAL == 'true'
      run: |
        ssh -o StrictHostKeyChecking=no mnw@20.189.126.248 "cd /home/mnw/proxy && docker-compose down"

    # - name: Stop and remove existing containers
    #   run: |
    #     ssh -o StrictHostKeyChecking=no mnw@20.189.126.248 "cd /home/mnw/proxy && docker-compose down"

    - name: Rebuild Docker containers
      run: |
        ssh -o StrictHostKeyChecking=no mnw@20.189.126.248 "cd /home/mnw/proxy && docker-compose up -d"

    - name: Show Docker container status
      run: |
        ssh -o StrictHostKeyChecking=no mnw@20.189.126.248 "docker ps -a"
